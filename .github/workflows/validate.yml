name: Validate planner factory

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile generator
        run: python -m py_compile planner_factory.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate example specification
        run: python planner_factory.py examples/simple_two_page_spec.json /tmp/planner-output.html --validate-only

      - name: Generate example planner
        run: python planner_factory.py examples/simple_two_page_spec.json /tmp/planner-output.html

      - name: Verify generated page structure
        run: |
          grep -q 'width:816px;height:1056px' /tmp/planner-output.html
          grep -q 'data-document-role="page"' /tmp/planner-output.html
